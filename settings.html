<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vitalisera – Inställningar</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body { font-family: Calibri, 'Segoe UI', system-ui, sans-serif; color: #1c2b33; background: #f4f6f7; }
    .vz-set { max-width: 560px; margin: 0 auto; padding: 22px 20px 40px; }
    .vz-set-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .vz-set-head img { width: 34px; height: 34px; border-radius: 8px; }
    .vz-set-head h1 { font-size: 19px; margin: 0; color: #08445c; }
    .vz-set-sub { color: #5b6b73; font-size: 13px; margin: 0 0 18px; }
    .vz-field { background: #fff; border: 1px solid #e1e7ea; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
    .vz-field label { display: block; font-weight: 600; color: #08445c; margin-bottom: 4px; font-size: 14px; }
    .vz-field .hint { color: #6a7a82; font-size: 12px; margin: 0 0 8px; }
    .vz-field input[type=text], .vz-field input[type=email] { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid #cfd8dc; border-radius: 7px; font-size: 14px; font-family: inherit; }
    .vz-sub { display: block; font-weight: 600; color: #357087; font-size: 12.5px; margin: 10px 0 3px; }
    .vz-ta { width: 100%; box-sizing: border-box; min-height: 92px; padding: 8px 10px; border: 1px solid #cfd8dc; border-radius: 7px; font-size: 13px; font-family: inherit; line-height: 1.45; resize: vertical; }
    .vz-row { display: flex; align-items: center; gap: 9px; }
    .vz-row input[type=checkbox] { width: 18px; height: 18px; }
    .vz-actions { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
    .vz-btn { background: #08445c; color: #fff; border: 0; border-radius: 8px; padding: 9px 18px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .vz-btn[disabled] { opacity: .55; cursor: default; }
    .vz-note { color: #437a3a; font-size: 13px; }
    .vz-testbadge { display: inline-block; background: #fbe9c6; color: #8a5a00; border-radius: 6px; padding: 2px 8px; font-size: 12px; font-weight: 600; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    (function () {
      var v = (new URLSearchParams(location.search)).get('v') || '';
      var q = v ? ('?v=' + encodeURIComponent(v)) : '';
      ['https://p.trellocdn.com/power-up.min.js', './config.js' + q, './settings.js' + q]
        .forEach(function (src) { document.write('<script src="' + src + '"><\/script>'); });
    })();
  </script>
  <!-- Versions-badge (cache-diagnos): visar vilken connector-version modalen laddades med. -->
  <script>
    (function () {
      var sp = new URLSearchParams(location.search);
      if (sp.get('compact') === '1') { return; }
      var b = document.createElement('div');
      b.id = 'vz-ver';
      b.textContent = 'v' + (sp.get('v') || '?');
      b.title = 'Connector-version';
      b.style.cssText = 'position:fixed;bottom:6px;right:8px;z-index:99999;font:600 11px/1 Calibri,system-ui,sans-serif;color:#5d7c87;background:rgba(255,255,255,.82);padding:3px 7px;border-radius:6px;pointer-events:none;opacity:.7';
      function add(){ (document.body || document.documentElement).appendChild(b); }
      if (document.body) { add(); } else { document.addEventListener('DOMContentLoaded', add); }
    })();
  </script>
</body>
</html>
