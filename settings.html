<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vitalisera – Inställningar</title>
  <style>
    /* P1.3: samma visuella identitet som vyerna (mint-bakgrund, mörk head-bar, accent-knapp, matchande radier). */
    html, body { height: 100%; margin: 0; }
    body { font-family: Calibri, 'Segoe UI', system-ui, sans-serif; color: #0d3142;
      background: linear-gradient(180deg, #eef6f6, #f3f9f9 220px); }
    .vz-set { max-width: 560px; margin: 0 auto; padding: 18px 20px 44px; }
    /* mörk topbar med logga — som Kursöversikt/Deltagarstatus */
    .vz-set-head { display: flex; align-items: center; gap: 12px; margin: 0 0 16px; padding: 16px 18px;
      border-radius: 14px; background: linear-gradient(120deg, #08445c, #0d3142);
      box-shadow: 0 8px 22px rgba(8,68,92,.18); }
    .vz-set-head img { width: 34px; height: 34px; border-radius: 8px; }
    .vz-set-head h1 { font-size: 19px; margin: 0; color: #fff; letter-spacing: .01em; }
    .vz-set-sub { color: #5b6b73; font-size: 13px; margin: -6px 2px 18px; }
    .vz-field { background: #fff; border: 1px solid #e1e7ea; border-radius: 14px; padding: 14px 16px; margin-bottom: 12px;
      box-shadow: 0 1px 2px rgba(13,49,66,.04); }
    .vz-field label { display: block; font-weight: 600; color: #08445c; margin-bottom: 4px; font-size: 14px; }
    .vz-field .hint { color: #6a7a82; font-size: 12px; margin: 0 0 8px; }
    .vz-field input[type=text], .vz-field input[type=email] { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid #cfd8dc; border-radius: 8px; font-size: 14px; font-family: inherit; }
    .vz-field input:focus-visible, .vz-ta:focus-visible { outline: none; border-color: #357087; box-shadow: 0 0 0 3px rgba(53,112,135,.16); }
    .vz-sub { display: block; font-weight: 600; color: #357087; font-size: 12.5px; margin: 10px 0 3px; }
    .vz-ta { width: 100%; box-sizing: border-box; min-height: 92px; padding: 8px 10px; border: 1px solid #cfd8dc; border-radius: 8px; font-size: 13px; font-family: inherit; line-height: 1.45; resize: vertical; }
    .vz-row { display: flex; align-items: center; gap: 9px; }
    .vz-row input[type=checkbox] { width: 18px; height: 18px; }
    .vz-actions { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
    .vz-btn { background: linear-gradient(180deg, #357087, #235468); color: #fff; border: 0; border-radius: 12px; padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
      box-shadow: 0 6px 16px rgba(53,112,135,.26); transition: transform .12s ease, box-shadow .12s ease; }
    .vz-btn:hover { transform: translateY(-1px); box-shadow: 0 9px 20px rgba(53,112,135,.32); }
    .vz-btn:focus-visible { outline: 3px solid rgba(53,112,135,.45); outline-offset: 2px; }
    .vz-btn[disabled] { opacity: .55; cursor: default; transform: none; box-shadow: none; }
    .vz-note { color: #437a3a; font-size: 13px; }
    .vz-saved-pill { background: rgba(31,122,83,.12); color: #1f7a53; border-radius: 20px; padding: 3px 12px; font-weight: 700; }
    .vz-testbadge { display: inline-block; background: #fbe9c6; color: #8a5a00; border-radius: 6px; padding: 2px 8px; font-size: 12px; font-weight: 600; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    (function () {
      var v = (new URLSearchParams(location.search)).get('v') || '';
      var q = v ? ('?v=' + encodeURIComponent(v)) : '';
      ['https://p.trellocdn.com/power-up.min.js', './config.js' + q, './settings.js' + q]
        .forEach(function (src) { document.write('<script src="' + src + '"><\/script>'); });
    })();
  </script>
  <!-- Versions-badge (cache-diagnos): visar vilken connector-version modalen laddades med. -->
  <script>
    (function () {
      var sp = new URLSearchParams(location.search);
      if (sp.get('compact') === '1') { return; }
      var b = document.createElement('div');
      b.id = 'vz-ver';
      b.textContent = 'v' + (sp.get('v') || '?');
      b.title = 'Connector-version';
      b.style.cssText = 'position:fixed;bottom:6px;right:8px;z-index:99999;font:600 11px/1 Calibri,system-ui,sans-serif;color:#5d7c87;background:rgba(255,255,255,.82);padding:3px 7px;border-radius:6px;pointer-events:none;opacity:.7';
      function add(){ (document.body || document.documentElement).appendChild(b); }
      if (document.body) { add(); } else { document.addEventListener('DOMContentLoaded', add); }
    })();
  </script>
</body>
</html>
