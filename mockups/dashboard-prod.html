<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vitalisera – Deltagardashboard (B+A produktion)</title>
  <!-- Deploy-relativa sökvägar: ligger i /mockups/, css/js i Pages-roten. -->
  <link rel="stylesheet" href="../dashboard.css" />
  <style>html,body{height:100%;margin:0}</style>
</head>
<body>
  <div id="root"></div>
  <script src="../dashboard-view.js"></script>
  <script>
    // Render produktionsvyn med inbyggd DEMO_MODEL (Bertil).
    var V = window.DashboardView;
    V.render(document.getElementById('root'), V.DEMO_MODEL, {
      onRunLabel: function (s) { console.log('run', s.key); },
      onTickChecklist: function (s) { console.log('tick', s.key); },
      onSelectStep: function (s) { console.log('select', s.key); }
    });
  </script>
</body>
</html>
