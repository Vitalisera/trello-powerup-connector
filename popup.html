<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kommandopalett</title>
  <style>
    :root {
      --fg: #172b4d;
      --muted: #5e6c84;
      --line: #dfe1e6;
      --accent: #0c66e4;
      --ok: #216e4e;
      --err: #ae2e24;
      --bg-hover: #f4f5f7;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--fg);
      font-size: 14px;
    }
    body { padding: 8px 10px 12px; }
    ul#cmds { list-style: none; margin: 0; padding: 0; }
    li.cmd {
      padding: 9px 10px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      line-height: 1.3;
    }
    li.cmd:hover, li.cmd:focus { background: var(--bg-hover); outline: none; }
    li.cmd:active { background: #ebecf0; }
    #status {
      margin-top: 10px;
      padding: 9px 10px;
      border-radius: 6px;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }
    #status.show { display: block; }
    #status.pending { background: #e9f2ff; color: var(--accent); }
    #status.ok { background: #dcfff1; color: var(--ok); }
    #status.err { background: #ffeceb; color: var(--err); }
    .hint { color: var(--muted); font-size: 12px; margin: 2px 2px 8px; }
  </style>
</head>
<body>
  <div class="hint">Välj ett kommando:</div>
  <ul id="cmds"><!-- fylls av popup.js --></ul>
  <div id="status" role="status" aria-live="polite"></div>

  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./config.js"></script>
  <script src="./popup.js"></script>
</body>
</html>
